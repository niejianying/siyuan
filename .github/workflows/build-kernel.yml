name: Build Kernel

on:
  push:
    paths:
      - 'kernel/mobile/**'
      - 'kernel/**/*.go'
      - 'go.mod'
      - 'go.sum'
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Android AAR
        run: bash scripts/build-android-aar.sh kernel kernel/kernel.aar

      - name: Build iOS XCFramework
        run: bash scripts/build-ios-framework.sh kernel kernel

      - uses: actions/upload-artifact@v4
        with:
          name: siyuan-kernel
          path: |
            kernel/kernel.aar
            kernel/SiYuanKernel.xcframework
          retention-days: 30
